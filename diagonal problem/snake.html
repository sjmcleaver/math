<script>

function cell(type, phase) {
  let polarity = (phase + type) % 2;
  let cell = document.createElement("div");
  cell.classList.add("cell");
  if (polarityToggle) {
    cell.classList.add(polarity ? "plus" : "minus");
  }
  let diagonal = document.createElement("div");
  diagonal.classList.add("diagonal");
  diagonal.classList.add(type ? "up" : "down");
  cell.appendChild(diagonal);
  return cell;
}

function junction(good) {
  let junction = document.createElement("div");
  junction.classList.add("junction");
  if (good) { junction.classList.add("good"); }
  return junction;
}

const EXAMPLE = "02020110202120102121022102222011101";

let rows = document.getElementById("rows"),
  code = document.getElementById("code"),
  polarityCheckbox = document.getElementById("polarity-view");

code.value = EXAMPLE;
polarityCheckbox.checked = false;

function clear() {
  while (rows.children.length) {
    rows.removeChild(rows.children[0]);
  }
}

function render(code) {
  clear();
  let d1 = document.createElement("div"),
    d2 = document.createElement("div"),
    last = "";
  (code).split("").map((c, i) => {
    let d = parseInt(c),
      p = i % 2;

    if (last == "1" && d == "2" || last == "2" && d == "1") {
      d1.appendChild(junction(p));
      d2.appendChild(junction(p));
    }

    if (d == 0) {
      d1.appendChild(p ? cell(0, p) : cell(1, p));
      d2.appendChild(p ? cell(1, p + 1) : cell(0, p + 1));
    } else if (d == 1) {
      d1.appendChild(p ? cell(1, p) : cell(0, p));
      d2.appendChild(p ? cell(1, p + 1) : cell(0, p + 1));
    } else {
      d1.appendChild(p ? cell(0, p) : cell(1, p));
      d2.appendChild(p ? cell(0, p + 1) : cell(1, p + 1));
    }
    last = d;
  });

  rows.appendChild(d1);
  rows.appendChild(d2);
}

function drawMatrix(M, p = false) {
  const pattern = document.createElement("div");
  pattern.classList.add("pattern");

  M.forEach((row, i) => {
    const div = document.createElement("div");
    div.classList.add("row");
    row.forEach((bit, j) => {
      let type = p ? ((bit + i + j) % 2) : bit;
      div.appendChild(cell(type, i + j));
    });
    pattern.appendChild(div);
  });
  rows.appendChild(pattern);
}

document.getElementById("draw").addEventListener("click", () => {
  render(code.value);
});

let polarityToggle = polarityCheckbox.checked;

polarityCheckbox.addEventListener("click", () => {
  polarityToggle = polarityCheckbox.checked;
  render(code.value);
});

function pattern(m, n, id) {
  let out = [];
  for (let i = 0; i < m; i++) {
    out[i] = [];
    for (let j = 0; j < n; j++) {
      out[i][j] = id % 2;
      id >>= 1;
    }
  }
  return out;
}

function bijections(n) {
  if (n == 1) { return [ (i) => { return i; } ]; }
  let all = [];
  let sub = bijections(n - 1);

  for (let i = 0; i < n; i++) {
    for (let j = 0; j < sub.length; j++) {
      let s = sub[j];
      all.push((k) => {
        if (k == 0) { return i; }
        return k <= i ? s(k - 1) : s(k - 1) + 1;
      });
    }
  }

  return all;
}
